services:
  asa:
    image: ghcr.io/musclepr/ark_ascended_docker:latest
    stop_grace_period: 120s
    tty: true
    env_file:
      - ./default/common.env
      - ./.common.env
    environment:
      - "COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME}"
    volumes:
      - ${HOST_CLUSTER_DIR:-.}/ark_data:/opt/arkserver
    cap_add:
      - NET_RAW
